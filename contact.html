  canvas#scene {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #6b8cff;
    display: block;
  }

  .hud {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 12px 20px;
    color: #fff;
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    letter-spacing: 1px;
    display: flex; justify-content: space-between;
    pointer-events: none;
    text-shadow: 2px 2px 0 #000;
    z-index: 5;

  .hud .val { color: #fff; }

    position: absolute; top: 12px; left: 12px;
    pointer-events: auto;
    background: #000;
    color: #fff;
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    padding: 10px 12px;
    border: 3px solid #fff;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 1px;
    image-rendering: pixelated;
    z-index: 10;
    transition: transform 60ms;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .back-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 rgba(0,0,0,0.45); }
  .back-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.35); }

    background: #d93b3b;
    color: #fff;
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    padding: 10px 12px;
    border: 3px solid #000;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);

    letter-spacing: 1px;
    z-index: 10;

    touch-action: manipulation;

  const sh = stage.clientHeight;
  const scale = Math.max(0.5, Math.min(sw / W, sh / H));
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function drawSprite(grid, x, y, palette, flipX = false) {
  for (let r = 0; r < grid.length; r++) {
    const row = grid[r];
    for (let c = 0; c < row.length; c++) {
      const ch = row[c];
      if (ch === '.' || ch === ' ') continue;
      const color = palette[ch];
      if (!color) continue;
      const drawX = flipX ? (x + (row.length - 1 - c)) : (x + c);
      px(drawX, y + r, 1, 1, color);
    }
  }
}

function drawHill(x, baseY, w) {
  const h = Math.floor(w * 0.45);
  for (let i = 0; i < h; i++) {
    const inset = Math.floor(i * (w / (h * 2)));
    px(x + inset, baseY - i, w - inset * 2, 1, C.hill);
  }
  px(x + w / 2 - 4, baseY - 4, 3, 2, C.hillD);
  px(x + w / 2 + 6, baseY - 8, 2, 2, C.hillD);
}

function drawPipe(x, y) {
  for (let i = 0; i < 32; i++) {

    px(x + 26, y + 8 + i, 2, 1, C.pipeD);

  px(x, y, 32, 1, C.pipeD);
  px(x, y + 7, 32, 1, C.pipeD);
  px(x, y, 1, 8, C.pipeD);
  px(x + 31, y, 1, 8, C.pipeD);
  px(x + 2, y + 1, 4, 2, C.pipeH);
}

  block: { x: 256 - 8, y: GROUND_Y - 16 - 48, hit: false, bumpT: 0, used: false },

  score: 0,
};

const card        = document.getElementById('card');
const replayBtn   = document.getElementById('replayBtn');
const startPrompt = document.getElementById('startPrompt');
const hudScore    = document.getElementById('hud-score');
const hudTime     = document.getElementById('hud-time');

function updateClock() {
  const d = new Date();
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  hudTime.textContent = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}
updateClock();
setInterval(updateClock, 15000);

function startAnimation() {
  if (state.phase !== 'idle') return;
  state.phase = 'run';
  state.startedAt = performance.now();
  startPrompt.classList.add('hide');
}

function resetAnimation() {
  state.t = 0;
  state.startedAt = null;
  state.phase = 'idle';
  state.hero = { x: -20, y: GROUND_Y - 16, vy: 0, facing: 1, anim: 'stand', frame: 0 };
  state.block = { x: 256 - 8, y: GROUND_Y - 16 - 48, hit: false, bumpT: 0, used: false };
  state.bug = { x: 300, y: GROUND_Y - 16, vx: -0.9, alive: true, squished: false, squishT: 0 };
  state.particles = [];
  state.cardShown = false;
  state.score = 0;
  card.classList.remove('show');
  replayBtn.classList.remove('show');
  startPrompt.classList.remove('hide');
  hudScore.textContent = '000000';
  updateClock();
}

window.addEventListener('keydown', () => { if (state.phase === 'idle') startAnimation(); });
document.getElementById('stage').addEventListener('click', e => {
  if (e.target.closest('.back-btn') || e.target.closest('.replay-btn') || e.target.closest('.contact-card')) return;
  if (state.phase === 'idle') startAnimation();
});
document.getElementById('stage').addEventListener('touchstart', e => {
  if (e.target.closest('.back-btn') || e.target.closest('.replay-btn') || e.target.closest('.contact-card')) return;
  if (state.phase === 'idle') { e.preventDefault(); startAnimation(); }
}, { passive: false });
replayBtn.addEventListener('click', resetAnimation);

/* ---------- Update ---------- */
function update(dt) {
  state.t += dt;
  const h = state.hero;
  const b = state.block;
  const bug = state.bug;

  if (state.phase === 'idle') return;

  if (state.phase === 'run') {
    h.x += 1.6;
    h.anim = 'run';
    h.frame = Math.floor(state.t / 120) % 2;

    if (bug.alive && !bug.squished) bug.x += bug.vx;

    const dxBug = bug.x - (h.x + 8);
    if (bug.alive && !bug.squished && dxBug < 30 && dxBug > 4) {
      h.vy = -3.6;
      state.phase = 'stompJump';
    } else if (h.x > b.x - 26 && state.phase === 'run') {
      state.phase = 'jump';
      h.vy = -4.6;
    }
  }

  if (state.phase === 'stompJump') {
    h.x += 1.4;
    h.vy += 0.22;
    h.y += h.vy;
    h.anim = 'jump';
    if (bug.alive && !bug.squished) bug.x += bug.vx;

    const heroFeet = h.y + 16;
    const bugTop   = bug.y + 4;
    const heroCx   = h.x + 8;
    if (!bug.squished && bug.alive && h.vy >= 0 &&
        heroFeet >= bugTop - 2 && heroFeet <= bugTop + 12 &&
        Math.abs(heroCx - (bug.x + 8)) < 12) {
      bug.squished = true;
      bug.squishT  = 0;
      bug.vx = 0;
      h.vy = -3.0;
      h.y  = bug.y - 12;
      state.score += 100;
      hudScore.textContent = String(state.score).padStart(6, '0');
      for (let i = 0; i < 10; i++) {
        state.particles.push({
          x: bug.x + 8, y: bug.y + 8,
          vx: (Math.random() - 0.5) * 2.6,
          vy: -1.2 - Math.random() * 1.6,
          life: 30,
          color: i % 2 ? C.bugBody : '#fff',
        });
      }
    }

    if (h.y >= GROUND_Y - 16) {
      h.y = GROUND_Y - 16;
      h.vy = 0;
      state.phase = 'run';
    }
  }

  if (state.phase === 'jump') {
    h.x += 1.0;
    h.vy += 0.22;
    h.y += h.vy;
    h.anim = 'jump';

    const headY      = h.y;
    const blockBottom = b.y + 16;
    const heroCenter  = h.x + 8;
    if (!b.hit && h.vy < 0 &&
        headY <= blockBottom + 1 &&
        heroCenter > b.x - 2 && heroCenter < b.x + 18) {
      b.hit   = true;
      b.bumpT = 0;
      h.vy    = 1.2;
      for (let i = 0; i < 12; i++) {
        state.particles.push({
          x: b.x + 8, y: b.y + 4,
          vx: (Math.random() - 0.5) * 3,
          vy: -2 - Math.random() * 2,
          life: 40,
          color: i % 2 ? C.coin : '#fff',
        });
      }
      state.score += 1000;
      hudScore.textContent = String(state.score).padStart(6, '0');
      setTimeout(() => {
        if (!state.cardShown) {
          card.classList.add('show');
          state.cardShown = true;
        }
      }, 180);
    }

    if (h.y >= GROUND_Y - 16) {
      h.y = GROUND_Y - 16;
      h.vy = 0;
      state.phase = 'settle';
    }
  }

  if (state.phase === 'settle') {
    h.x += 0.8;
    h.anim = 'run';
    h.frame = Math.floor(state.t / 120) % 2;
    if (h.x > b.x + 8) {
      h.anim = 'stand';
      state.phase = 'done';
      replayBtn.classList.add('show');
    }
  }

  if (state.phase === 'done') h.anim = 'stand';

  if (b.hit && !b.used) {
    b.bumpT += dt;
    const k = b.bumpT / 220;
    b._yo = k <= 1 ? -Math.sin(k * Math.PI) * 8 : 0;
    if (k > 1) b.used = true;
  }

  if (bug.squished) {
    bug.squishT += dt;
    if (bug.squishT > 800) bug.alive = false;
  }

  state.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= 1; });
  state.particles = state.particles.filter(p => p.life > 0);
}

/* ---------- Render ---------- */
function render() {
  ctx.fillStyle = C.sky;
  ctx.fillRect(0, 0, W, H);

  const cloudT = state.t * 0.01;
  drawSprite(CLOUD, ((40  - cloudT * 4) % (W + 32) + W + 32) % (W + 32) - 32, 36, CLOUD_PAL);
  drawSprite(CLOUD, ((220 - cloudT * 3) % (W + 32) + W + 32) % (W + 32) - 32, 60, CLOUD_PAL);
  drawSprite(CLOUD, ((400 - cloudT * 5) % (W + 32) + W + 32) % (W + 32) - 32, 24, CLOUD_PAL);

  drawHill(60,  GROUND_Y, 100);
  drawHill(330, GROUND_Y, 80);
  drawHill(180, GROUND_Y, 50);
  drawHill(440, GROUND_Y, 60);

  const b = state.block;
  drawSprite(b.used ? BLOCK_USED : BLOCK, b.x, b.y + (b._yo || 0), b.used ? BLOCK_USED_PAL : BLOCK_PAL);

  if (state.cardShown) {
    drawSpark(b.x + 8,  b.y + 8  + (b._yo || 0), state.t);
    drawSpark(b.x - 14, b.y + 4,                  state.t + 400);
    drawSpark(b.x + 30, b.y + 6,                  state.t + 800);
  }

  drawPipe(W - 50, GROUND_Y - 32);

  const bug = state.bug;
  if (bug.alive && state.phase !== 'idle') {
    if (bug.squished) {
      const sx = bug.x, sy = bug.y + 12;
      px(sx + 1, sy + 1, 14, 3, C.bugBodyD);
      px(sx + 2, sy + 1, 12, 2, C.bugBody);
      px(sx + 4, sy + 1, 1, 1, '#000');
      px(sx + 11, sy + 1, 1, 1, '#000');
    } else {
      const wobble = Math.floor(state.t / 150) % 2;
      drawSprite(BUG, bug.x, bug.y + wobble, BUG_PAL);
    }
  }

  const h = state.hero;
  if (state.phase !== 'idle') {
    let grid = HERO_STAND;
    if (h.anim === 'run')  grid = h.frame ? HERO_RUN : HERO_STAND;
    if (h.anim === 'jump') grid = HERO_JUMP;
    drawSprite(grid, Math.round(h.x), Math.round(h.y), HERO_PAL, h.facing < 0);
  }

  state.particles.forEach(p => px(p.x, p.y, 2, 2, p.color));

  for (let x = 0; x < W; x += 16) {
    drawSprite(BRICK, x, GROUND_Y,      BRICK_PAL);
    drawSprite(BRICK, x, GROUND_Y + 16, BRICK_PAL);
  }
}

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(40, now - lastT);
  lastT = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// no auto-start — waits for key or tap
</script>
</body>
</html>
