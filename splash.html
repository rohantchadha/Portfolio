<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rohant Chadha</title>
<!-- Open Graph (social sharing) -->
<meta property="og:title" content="Rohant Chadha — Product Designer & PM">
<meta property="og:description" content="Available to shape products worth shipping. New Delhi.">
<meta property="og:image" content="https://rohantchadha.com/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Rohant Chadha — Product Designer & PM">
<meta name="twitter:description" content="Available to shape products worth shipping. New Delhi.">
<meta name="twitter:image" content="https://rohantchadha.com/og-image.png">

  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      padding: 2rem;
    }

    .monitor {
      width: 100%;
      max-width: 700px;
    }

    .titlebar {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .bartitle {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: #2a2a2a;
      letter-spacing: 0.05em;
    }

    .screen {
      background: #0c0a00;
      border: 1px solid #2a2a2a;
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 2.8rem 3rem 3.2rem;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    /* Scanlines */
    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.22) 0px,
        rgba(0,0,0,0.22) 1px,
        transparent 1px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Vignette */
    .screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 6;
    }

    .content {
      position: relative;
      z-index: 7;
      line-height: 1.8;
    }

    .boot {
      font-size: 12px;
      color: #3a3020;
      min-height: 18px;
      margin-bottom: 1.2rem;
    }

    .prompt-row {
      font-size: 14px;
      color: #d4622a;
      margin-bottom: 1.8rem;
      text-shadow: 0 0 8px rgba(212,98,42,0.6);
      min-height: 22px;
    }

    .inline-cur {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #d4622a;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.9s step-end infinite;
    }

    .ln {
      font-size: 13px;
      line-height: 1.8;
      display: block;
      opacity: 0;
      min-height: 24px;
    }

    .ln-name {
      font-size: 15px;
      font-weight: 700;
      color: #f0e0d0;
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px rgba(240,200,180,0.2);
      margin-bottom: 0.1rem;
    }

    .ln-sub  { color: #6a5a4a; }
    .ln-mid  { color: #c8a888; margin-top: 0.3rem; }
    .ln-dim  { color: #8a7868; }

    .ln-accent {
      color: #d4622a;
      margin-top: 0.4rem;
      text-shadow: 0 0 8px rgba(212,98,42,0.5);
    }

    .ln-cta  { margin-top: 1.8rem; }

    .cta-sym  { color: #2a2018; margin-right: 10px; }

    .cta-link {
      color: #d4622a;
      text-decoration: none;
      border-bottom: 1px solid #6a3010;
      padding-bottom: 2px;
      text-shadow: 0 0 8px rgba(212,98,42,0.4);
      letter-spacing: 0.04em;
    }

    .cta-link:hover {
      color: #ff8844;
      text-shadow: 0 0 12px rgba(255,136,68,0.8);
    }

    .endcur {
      display: inline-block;
      width: 9px;
      height: 15px;
      background: #d4622a;
      vertical-align: middle;
      margin-left: 6px;
      box-shadow: 0 0 8px rgba(212,98,42,0.8);
      animation: blink 1.1s step-end infinite;
      opacity: 0;
      transition: opacity 0.2s;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 10px;
      color: #1e1e1e;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>

  <div class="monitor">
    <div class="titlebar">
      <div class="dot" style="background:#ff5f57;"></div>
      <div class="dot" style="background:#ffbd2e;"></div>
      <div class="dot" style="background:#28ca41;"></div>
      <span class="bartitle">rohant.chadha — query</span>
    </div>
    <div class="screen">
      <div class="content">
        <div class="boot" id="boot"></div>
        <div class="prompt-row" id="prompt"><span class="inline-cur" id="icur"></span></div>
        <div id="out">
          <span class="ln ln-name"   id="l1"></span>
          <span class="ln ln-sub"    id="l2"></span>
          <span class="ln ln-mid"    id="l3"></span>
          <span class="ln ln-dim"    id="l4"></span>
          <span class="ln ln-dim"    id="l5"></span>
          <span class="ln ln-accent" id="l6">// Available to shape products worth shipping.</span>
          <span class="ln ln-cta"    id="l7">
            <span class="cta-sym">_</span>
            <a class="cta-link" href="index.html#/desk">enter my desk →</a>
            <span class="endcur" id="endcur"></span>
          </span>
        </div>
      </div>
    </div>
    <div class="footer">■ ROHANT.CHADHA ■ v1.0 ■</div>
  </div>

  <script>
    (function(){
      var wait = function(ms){ return new Promise(function(r){ setTimeout(r, ms); }); };
      var glyphs = '$#@&*%!/\\?><~^|+=';

      async function typeQuery(text){
        var prompt = document.getElementById('prompt');
        var cur = document.getElementById('icur');
        for(var i = 0; i < text.length; i++){
          var t = document.createTextNode(text[i]);
          prompt.insertBefore(t, cur);
          await wait(75 + Math.random()*55);
        }
        cur.style.display = 'none';
      }

      function scrambleLine(el, finalText, totalDuration, glyphColor, finalColor){
        var len = finalText.length;
        var startTime = null;
        var interval = 40;
        el.style.opacity = '1';
        return new Promise(function(resolve){
          function frame(ts){
            if(!startTime) startTime = ts;
            var elapsed = ts - startTime;
            var progress = Math.min(elapsed / totalDuration, 1);
            var locked = Math.floor(progress * len);
            var html = '';
            for(var i = 0; i < len; i++){
              if(finalText[i] === ' '){
                html += ' ';
              } else if(i < locked){
                html += '<span style="color:'+finalColor+'">'+finalText[i]+'</span>';
              } else {
                var g = glyphs[Math.floor(Math.random()*glyphs.length)];
                html += '<span style="color:'+glyphColor+'">'+g+'</span>';
              }
            }
            el.innerHTML = html;
            if(progress < 1){
              setTimeout(function(){ requestAnimationFrame(frame); }, interval);
            } else {
              el.textContent = finalText;
              el.style.color = finalColor;
              resolve();
            }
          }
          requestAnimationFrame(frame);
        });
      }

      async function showLine(id, delay){
        await wait(delay);
        var el = document.getElementById(id);
        el.style.transition = 'opacity 0.15s';
        el.style.opacity = '1';
      }

      async function run(){
        var bootEl = document.getElementById('boot');
        var boots = ['Initializing...', 'Loading records...', ''];
        for(var b = 0; b < boots.length; b++){
          bootEl.textContent = boots[b];
          await wait(320);
        }

        await typeQuery('› who is rohant chadha?');
        await wait(380);

        var glyphCol = '#d4622a';

        setTimeout(function(){ scrambleLine(document.getElementById('l1'), 'ROHANT CHADHA', 2000, glyphCol, '#f0e0d0'); }, 0);
        setTimeout(function(){ scrambleLine(document.getElementById('l2'), 'Product Designer & PM — New Delhi', 1600, glyphCol, '#6a5a4a'); }, 900);
        setTimeout(function(){ scrambleLine(document.getElementById('l3'), 'Previously @ NowForm. Now designing independently.', 1600, glyphCol, '#c8a888'); }, 1800);
        setTimeout(function(){ scrambleLine(document.getElementById('l4'), 'Certified animal person. Long-term plan: own a farm.', 1500, glyphCol, '#8a7868'); }, 2700);
        setTimeout(function(){ scrambleLine(document.getElementById('l5'), 'Short-term plan: keep naming strays.', 1400, glyphCol, '#8a7868'); }, 3500);

        showLine('l6', 5200);
        showLine('l7', 5800);
        await wait(6000);
        document.getElementById('endcur').style.opacity = '1';
      }

      wait(400).then(run);
    })();
  </script>

</body>
</html>
