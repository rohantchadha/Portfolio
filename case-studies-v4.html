<script type="text/babel" data-presets="react">

function useClock() {
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => { const t = setInterval(() => setNow(new Date()), 15000); return () => clearInterval(t); }, []);
  const h12 = ((now.getHours() + 11) % 12) + 1;
  return { hh: String(h12), mm: String(now.getMinutes()).padStart(2,'0'), ampm: now.getHours() >= 12 ? 'PM' : 'AM' };
}

function useVP() {
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => {
    const fn = () => setVp({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return vp;
}

function useWindows(seed) {
  const [wins, setWins] = React.useState(() => seed.map((w, i) => ({ ...w, z: i + 1, minimized: false })));
  const [topZ, setTopZ] = React.useState(seed.length + 1);
  const focus = React.useCallback(id => {
    setWins(ws => { const w = ws.find(x => x.id === id); if (!w || (w.z === topZ && !w.minimized)) return ws; return ws.map(x => x.id === id ? { ...x, z: topZ + 1, minimized: false } : x); });
    setTopZ(z => z + 1);
  }, [topZ]);
  const open = React.useCallback(win => {
    setWins(ws => { const ex = ws.find(w => w.id === win.id); if (ex) return ws.map(w => w.id === win.id ? { ...w, z: topZ + 1, minimized: false, ...win } : w); return [...ws, { ...win, z: topZ + 1, minimized: false }]; });
    setTopZ(z => z + 1);
  }, [topZ]);
  const close    = React.useCallback(id => setWins(ws => ws.filter(w => w.id !== id)), []);
  const minimize = React.useCallback(id => setWins(ws => ws.map(w => w.id === id ? { ...w, minimized: true } : w)), []);
  const move     = React.useCallback((id, x, y) => setWins(ws => ws.map(w => w.id === id ? { ...w, x, y } : w)), []);
  return { wins, focus, open, close, minimize, move };
}

function useDraggable(ref, callbacks) {
  // Keep a ref to latest values so the effect never needs to re-run
  // (re-running on every focus/move would tear down the pointermove listener mid-drag)
  const cb = React.useRef(callbacks);
  cb.current = callbacks;

  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    const handle = el.querySelector('[data-drag-handle]'); if (!handle) return;
    let drag = null;

    const down = e => {
      if (e.button !== 0 || e.target.closest('[data-no-drag]')) return;
      e.preventDefault(); e.stopPropagation();
      cb.current.onStart && cb.current.onStart();
      const r = el.getBoundingClientRect();
      drag = { sx: e.clientX, sy: e.clientY,
               ox: cb.current.x, oy: cb.current.y,
               scale: (r.width / el.offsetWidth) || 1 };
      window.addEventListener('pointermove', mv);
      window.addEventListener('pointerup', up);
    };

    const mv = e => {
      if (!drag) return;
      const nx = Math.max(0,  Math.min(window.innerWidth  - 60, drag.ox + (e.clientX - drag.sx) / drag.scale));
      const ny = Math.max(0,  Math.min(window.innerHeight - 50, drag.oy + (e.clientY - drag.sy) / drag.scale));
      cb.current.onMove(nx, ny);
    };

    const up = () => {
      drag = null;
      window.removeEventListener('pointermove', mv);
      window.removeEventListener('pointerup', up);
    };

    handle.addEventListener('pointerdown', down);
    return () => {
      handle.removeEventListener('pointerdown', down);
      window.removeEventListener('pointermove', mv);
      window.removeEventListener('pointerup', up);
    };
  }, []); // mount once — latest x/y/callbacks always read via cb.current
}

function useBoot() {
  const [phase, setPhase] = React.useState('boot');
  React.useEffect(() => { const t1 = setTimeout(() => setPhase('welcome'), 1400), t2 = setTimeout(() => setPhase('done'), 2400); return () => { clearTimeout(t1); clearTimeout(t2); }; }, []);
  return phase;
}

Object.assign(window, { useClock, useVP, useWindows, useDraggable, useBoot });

  { id:'pousse-le-rit',   name:'Pousse Le Rit',    kind:'Case Study',  tone:'rose',    size:'5.7 MB',  modified:'Nov 21, 2025', blurb:'A website for a French farm selling natural, organic produce. Hand-set and grounded — closer to a market stall than a supermarket.', comingSoon: true },

    <svg width={size} height={size} viewBox="0 0 32 32" shapeRendering="crispEdges">

      <rect x="9" y="7" width="14" height="10" fill="#2d3a2a" stroke={s} strokeWidth="0.8"/>

  if (kind === 'home') return (
    <svg width={size} height={size} viewBox="0 0 32 32" shapeRendering="crispEdges">
      <path d="M8 4L22 4L26 8L26 28L8 28Z" fill={f} stroke={s} strokeWidth="1.2"/>
      <path d="M22 4L22 8L26 8" fill="none" stroke={s} strokeWidth="1.2"/>
      <path d="M11 18L17 13L23 18" fill="none" stroke={s} strokeWidth="1"/>
      <rect x="13" y="18" width="8" height="6" fill="none" stroke={s} strokeWidth="1"/>
      <rect x="16" y="20" width="2" height="4" fill={s}/>
    </svg>);
  return null;
}

// ─── Menu bar ────────────────────────────────────────────

    File:    [ {label:'New Folder',shortcut:'⌘N',disabled:true},{label:'Open',shortcut:'⌘O',disabled:true},{label:'Open Homepage',action:'open-home'},{label:'Close Window',shortcut:'⌘W',disabled:true},{sep:true},{label:'Get Info',shortcut:'⌘I',disabled:true},{label:'Print…',shortcut:'⌘P',disabled:true},{sep:true},{label:'Quit',shortcut:'⌘Q',disabled:true} ],
    Edit:    [ {label:'Undo',shortcut:'⌘Z',disabled:true},{sep:true},{label:'Cut',shortcut:'⌘X',disabled:true},{label:'Copy',shortcut:'⌘C',disabled:true},{label:'Paste',shortcut:'⌘V',disabled:true},{label:'Clear',disabled:true},{sep:true},{label:'Select All',shortcut:'⌘A',disabled:true} ],
    View:    [ {label:'by Small Icon',disabled:true},{label:'by Icon',check:view==='icon',action:'view-icon'},{label:'by List',check:view==='list',action:'view-list'},{sep:true},{label:'Clean Up Window',disabled:true} ],
    Special: [ {label:'Clean Up Desktop',disabled:true},{label:'Empty Trash…',disabled:true},{sep:true},{label:'Eject Disk',shortcut:'⌘E',disabled:true},{label:'Erase Disk…',disabled:true},{sep:true},{label:'Restart',action:'restart'},{label:'Shut Down',action:'shutdown'} ],
  };
  const LEFT = { apple:6, File:38, Edit:80, View:116, Special:158 };
  const toggle = k => e => { e.stopPropagation(); setOpen(o => o === k ? null : k); };
  const choose = it => { if (it.disabled) return; setOpen(null); if (it.action) onAction(it.action); };

  return (
    <div data-menubar style={{ height:22, background:T.chrome, borderBottom:`1px solid ${T.line}`, display:'flex', alignItems:'center', paddingLeft:10, paddingRight:10, fontFamily:T.ui, fontSize:13, color:T.ink, position:'relative', zIndex:1000, boxShadow:'0 1px 0 rgba(0,0,0,0.15)', flexShrink:0 }}>

          <span style={{ fontFamily:T.serif, fontStyle:'italic', fontSize:15, fontWeight:700 }}>ℜ</span>
        </div>
        {['File','Edit','View','Special'].map(k => (
          <div key={k} data-no-drag onClick={toggle(k)} style={{ cursor:'pointer', padding:'0 6px', height:22, display:'flex', alignItems:'center', background:open===k?T.line:'transparent', color:open===k?'#fff':T.ink, fontWeight:k==='File'?600:400 }}>{k}</div>
        ))}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:10, fontSize:12 }}>
        <span style={{ opacity:0.7 }}>?</span>
        <span style={{ fontVariantNumeric:'tabular-nums' }}>{clock.hh}:{clock.mm} {clock.ampm}</span>
      </div>
      {open && (
        <div onClick={e=>e.stopPropagation()} style={{ position:'absolute', top:22, left:LEFT[open], minWidth:200, background:'#fff', border:`1px solid ${T.line}`, boxShadow:`2px 2px 0 0 ${T.line}`, fontFamily:T.ui, fontSize:13, padding:'4px 0', zIndex:2000 }}>
          {MENUS[open].map((it,i) => it.sep
            ? <div key={i} style={{ borderTop:`1px solid ${T.line}`, margin:'4px 0', opacity:0.5 }}/>
            : <MenuItem key={i} {...it} onClick={() => choose(it)}/>
          )}
        </div>
      )}
    </div>

}

function MenuItem({ label, shortcut, onClick, disabled, glyph, check }) {
  const [h, setH] = React.useState(false);
  return (
    <div onClick={disabled?undefined:onClick} onMouseEnter={()=>!disabled&&setH(true)} onMouseLeave={()=>setH(false)}
      style={{ padding:'2px 14px 2px 22px', position:'relative', display:'flex', justifyContent:'space-between', cursor:disabled?'default':'pointer', background:h?T.line:'transparent', color:disabled?'#a8a298':h?'#fff':T.ink }}>
      {check && <span style={{ position:'absolute', left:8, top:2, fontSize:11 }}>✓</span>}
      {glyph && !check && <span style={{ position:'absolute', left:8, top:2, fontSize:11 }}>{glyph}</span>}
      <span>{label}</span>
      {shortcut && <span style={{ opacity:disabled?0.5:0.85, marginLeft:12 }}>{shortcut}</span>}
    </div>
  );
}

// ─── Window chrome ───────────────────────────────────────
function MacWindow({ win, focused, onFocus, onClose, onMinimize, onMove, children }) {
  const ref = React.useRef(null);
  useDraggable(ref, { x:win.x, y:win.y, onMove, onStart:onFocus });
  return (
    <div ref={ref} onMouseDown={onFocus} style={{ position:'absolute', left:win.x, top:win.y, width:win.w, background:'#fff', border:`1px solid ${T.line}`, boxShadow:`2px 2px 0 0 ${T.line},0 6px 18px rgba(0,0,0,0.18)`, zIndex:win.z, fontFamily:T.ui, pointerEvents:'auto' }}>
      <div data-drag-handle style={{ height:19, position:'relative', borderBottom:`1px solid ${T.line}`, background:focused?stripeBar:T.chrome, display:'flex', alignItems:'center', justifyContent:'center', cursor:'grab', userSelect:'none' }}>
        {focused && <>
          <div data-no-drag onClick={onClose} onMouseDown={e=>e.stopPropagation()} style={{ position:'absolute', left:8, top:4, width:11, height:11, background:'#fff', border:`1px solid ${T.line}`, cursor:'pointer' }}/>
          <div data-no-drag onMouseDown={e=>e.stopPropagation()} style={{ position:'absolute', right:26, top:4, width:11, height:11, background:'#fff', border:`1px solid ${T.line}`, cursor:'pointer', boxShadow:`inset 0 0 0 2px ${T.line},inset 0 0 0 3px #fff` }}/>
          <div data-no-drag onClick={onMinimize} onMouseDown={e=>e.stopPropagation()} style={{ position:'absolute', right:8, top:4, width:11, height:11, background:'#fff', border:`1px solid ${T.line}`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ width:5, height:5, background:T.line }}/>
          </div>
        </>}
        <div style={{ background:focused?T.chrome:'transparent', padding:'0 10px', fontSize:12, fontWeight:600, color:T.ink }}>{win.title}</div>
      </div>
      <div style={{ position:'relative' }}>
        {children}
        <div style={{ position:'absolute', right:0, bottom:0, width:14, height:14, background:'#fff', borderLeft:`1px solid ${T.line}`, borderTop:`1px solid ${T.line}`, backgroundImage:`repeating-linear-gradient(135deg,transparent 0 2px,${T.line} 2px 3px)`, pointerEvents:'none' }}/>
      </div>
    </div>
  );
}

      </div>

function SR({ children, active, onClick }) {
  const [h, setH] = React.useState(false);

// ─── Desktop icon (draggable) ────────────────────────────
function DesktopIcon({ icon, selected, onSelect, onMove, onActivate }) {
  const ref = React.useRef(null);
  const sr  = React.useRef({ icon, onMove, onSelect, onActivate });
  sr.current = { icon, onMove, onSelect, onActivate };
  React.useEffect(() => {
    const el = ref.current; if (!el) return;
    let drag = null;
    const down = e => {
      if (e.button !== 0) return;
      e.stopPropagation(); e.preventDefault(); sr.current.onSelect();
      const host = el.closest('[data-os-root]');
      const r = host.getBoundingClientRect();
      drag = { sx:e.clientX,sy:e.clientY,ox:sr.current.icon.x,oy:sr.current.icon.y,scale:(r.width/host.offsetWidth)||1,moved:false,lastAt:el._lastAt||0 };
      window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
    };
    const mv = e => {
      if (!drag) return;
      const dx=(e.clientX-drag.sx)/drag.scale,dy=(e.clientY-drag.sy)/drag.scale;
      if (!drag.moved&&Math.hypot(dx,dy)>4) drag.moved=true;
      if (drag.moved) sr.current.onMove(Math.max(8,Math.min(window.innerWidth-80,drag.ox+dx)), Math.max(28,Math.min(window.innerHeight-60,drag.oy+dy)));
    };
    const up = () => {
      if (!drag) return;
      const now=Date.now();
      if (!drag.moved){const{icon:ic,onActivate:act}=sr.current;if(ic.singleClick||now-drag.lastAt<400)act();el._lastAt=now;}
      drag=null;window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);
    };
    el.addEventListener('pointerdown',down);
    return ()=>{el.removeEventListener('pointerdown',down);window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);};
  }, []);
  return (
    <div ref={ref} title={icon.tooltip} style={{ position:'absolute',left:icon.x,top:icon.y,display:'flex',flexDirection:'column',alignItems:'center',width:72,cursor:'pointer',userSelect:'none',zIndex:40,pointerEvents:'auto' }}>
      <div style={{ filter:selected?'invert(1)':'drop-shadow(1px 1px 0 rgba(0,0,0,0.45))',padding:2 }}>
        <Icon kind={icon.kind} size={40} fill={icon.fill}/>
      </div>
      <div style={{ marginTop:3,fontSize:10,fontFamily:T.ui,textAlign:'center',lineHeight:1.15,background:selected?T.line:'rgba(255,250,235,0.88)',color:selected?'#fff':T.ink,padding:'1px 4px',boxShadow:selected?'none':'0 1px 0 rgba(0,0,0,0.14)' }}>{icon.label}</div>
    </div>
  );
}

function macCursor() {
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='16' height='22'><path d='M1 1 L1 16 L5 12 L8 20 L10 19 L7 11 L13 11 Z' fill='white' stroke='black' stroke-width='1.4' stroke-linejoin='miter'/></svg>`;
  return `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}") 1 1,default`;
}

// ─── Root ────────────────────────────────────────────────
function MacDesktop() {
  const phase = useBoot();
  const clock = useClock();
  const vp    = useVP();   // live viewport dimensions
  const [view, setView] = React.useState('list');

  // Icons anchored to right edge, recalculate when vp changes
  const [icons, setIcons] = React.useState(() => [
    { id:'rohant', kind:'computer', label:'RohantOS',  fill:T.paper,   tooltip:'Double-click to open About',    action:'about',    x: window.innerWidth-96, y:46  },
    { id:'work',   kind:'folder',   label:'Work',       fill:'#e8d5b7', tooltip:'Double-click to open Work',     action:'work',     x: window.innerWidth-96, y:148 },
    { id:'home',   kind:'home',     label:'Homepage',   fill:T.paper,   tooltip:'Click to open Homepage',        action:'homepage', x: window.innerWidth-96, y:248, singleClick:true },
  ]);

  // Keep icons pinned to right edge on resize
  const prevVpW = React.useRef(window.innerWidth);
  React.useEffect(() => {
    const delta = vp.w - prevVpW.current;
    if (delta !== 0) {
      setIcons(arr => arr.map(ic => ({ ...ic, x: ic.x + delta })));
      prevVpW.current = vp.w;
    }
  }, [vp.w]);

  // Windows — seed positions relative to initial viewport
  const { wins, focus, open, close, minimize, move } = useWindows([
    { id:'explorer', type:'explorer', title:'Work',               x:40,                        y:42, w:Math.min(550,window.innerWidth*0.43), h:420 },
    { id:'about',    type:'about',    title:'About This Designer', x:Math.max(380,window.innerWidth-476), y:68, w:370, h:400 },
  ]);

  const openAbout    = () => open({ id:'about',    type:'about',    title:'About This Designer', x:Math.max(380,vp.w-476), y:68, w:370, h:400 });
  const openWork     = () => open({ id:'explorer', type:'explorer', title:'Work',               x:40,                     y:42, w:Math.min(550,vp.w*0.43), h:420 });
  const openHomepage = () => open({ id:'homepage', type:'homepage', title:'Homepage',            x:Math.round(vp.w/2-150),y:Math.round(vp.h/2-100), w:300, h:200 });
  const openProject  = p  => { if(p.url){ window.location.href = p.url; return; } open({ id:`case-${p.id}`, type:'case', project:p, title:p.name, x:160+Math.random()*160, y:90+Math.random()*120, w:390, h:300 }); };

  const focusedId = wins.reduce((acc,w)=>(!acc||w.z>acc.z?w:acc),null)?.id;

  const activate = id => {
    const ic=icons.find(x=>x.id===id); if(!ic) return;
    if(ic.action==='about') openAbout();
    else if(ic.action==='work') openWork();
    else if(ic.action==='homepage') { sessionStorage.setItem('skipSplash','1'); window.location.href='index.html#/desk'; }
  };

  return (
    <div data-os-root onClick={()=>{}} onContextMenu={e=>e.preventDefault()}
      style={{ position:'relative',width:'100vw',height:'100vh',overflow:'hidden',cursor:macCursor(),fontFamily:T.ui,background:'#000',display:'flex',flexDirection:'column' }}>

      <div style={{ position:'absolute',inset:0,zIndex:0,backgroundImage:"url('pixel_dog.jpeg')",backgroundSize:'cover',backgroundPosition:'center',backgroundRepeat:'no-repeat' }}/>

      {/* menu bar */}
      <div style={{ position:'relative',zIndex:1000,flexShrink:0 }}>
        <MenuBar view={view} onAction={a=>{
          if(a==='open-home' || a==='quit') { sessionStorage.setItem('skipSplash','1'); window.location.href='index.html#/desk'; }
          else if(a==='restart' || a==='shutdown') { window.location.href='splash.html'; }
          else if(a==='view-icon') setView('icon');
          else if(a==='view-list') setView('list');
        }} clock={clock}/>
      </div>

      {/* desktop area */}
      <div style={{ position:'relative',flex:1,overflow:'hidden' }}>

        {/* desktop icons */}
        {icons.map(ic=>(
          <DesktopIcon key={ic.id} icon={ic} selected={false}
            onSelect={()=>{}}
            onMove={(x,y)=>setIcons(arr=>arr.map(it=>it.id===ic.id?{...it,x,y}:it))}
            onActivate={()=>activate(ic.id)}/>
        ))}

        {/* sticky note */}
        <div style={{ position:'absolute',left:52,bottom:'18%',width:180,padding:'14px 14px 20px',background:'#fef4a8',color:'#5a4a2a',fontFamily:'"Caveat","Marker Felt","Segoe Print",cursive',fontSize:16,lineHeight:1.35,transform:'rotate(-3deg)',boxShadow:'3px 4px 0 rgba(0,0,0,0.25),0 1px 3px rgba(0,0,0,0.15)',zIndex:4 }}>
          double-click any folder to open a case study. coffee's cold, ideas aren't.
          <div style={{ marginTop:5,fontSize:13,opacity:0.7 }}>— R.</div>
        </div>

        {/* windows */}
        <div style={{ position:'absolute',inset:0,pointerEvents:'none',zIndex:50 }}>
          {wins.filter(w=>!w.minimized).map(w=>{
            const focused=w.id===focusedId;
            const fp={ key:w.id,win:w,focused,onFocus:()=>focus(w.id),onClose:()=>close(w.id),onMinimize:()=>minimize(w.id),onMove:(x,y)=>move(w.id,x,y) };
            if(w.type==='explorer') return <MacWindow {...fp}><Explorer onOpenProject={openProject} view={view} setView={setView}/></MacWindow>;
            if(w.type==='about')    return <AboutDialog {...fp}/>;
            if(w.type==='homepage') return <HomepageDialog {...fp}/>;
            if(w.type==='case')     return <MacWindow {...fp}><CaseStub project={w.project}/></MacWindow>;
            return null;
          })}
        </div>

        {/* minimised tabs */}
        <div style={{ position:'absolute',bottom:8,left:240,right:240,display:'flex',gap:8,flexWrap:'wrap',pointerEvents:'none',zIndex:60 }}>
          {wins.filter(w=>w.minimized).map(w=>(
            <button key={w.id} onClick={()=>focus(w.id)} style={{ pointerEvents:'auto',padding:'3px 10px',background:T.chrome,border:`1px solid ${T.line}`,boxShadow:`1.5px 1.5px 0 0 ${T.line}`,fontFamily:T.ui,fontSize:10,cursor:'pointer' }}>{w.title}</button>
          ))}
        </div>
      </div>

      <Boot phase={phase}/>

      {/* CRT scanlines */}
      <div style={{ position:'absolute',inset:0,pointerEvents:'none',background:'repeating-linear-gradient(0deg,rgba(0,0,0,0.05) 0 1px,transparent 1px 3px)',mixBlendMode:'multiply',zIndex:9998 }}/>
    </div>
  );
}

Object.assign(window, { MacDesktop });
</script>
